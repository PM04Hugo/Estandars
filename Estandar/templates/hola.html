{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div style="
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4rem;
  background-color: #f5f5f5;
">

    
    <div style="
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        padding: 2.5rem;
        width: 100%;
        max-width: 720px;
        
    ">
        <!--Tranformarlo en formulario?????? A lo mejor, asi comprobamos todo y hacemos el redirect hasta lo nuevo y pasamos la info -->
        <!-- Hacerlo luego, si eso hacer lo del formato lo que dijo Yslem-->
        
            <form method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: row; align-items: flex-start; gap: 3rem;">
                {% csrf_token %}

                <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                    <input type="file" id="fileInput" name="fileInput" style="display: none" accept=".csv"/>
                    <label for="fileInput" style="cursor: pointer; text-align: center;">
                        <img id="imgI" src="/static/img/plus.png" width="300" height="300" style="object-fit: contain;"/>
                        <br>
                        <span class="fs-label" id="subirI" style="display: block; margin-top: 10px;">Subir imagen</span>
                    </label>
                </div>

                <div style="flex: 1; display: flex; flex-direction: column; gap: 1.5rem;">
                    <div>
                        <label class="fs-label" for="nombre">Nombre</label>
                        <input class="fs-input" type="text" id="nombre" name="nombre" placeholder="Escribe un nombre..." style="width: 100%;">
                    </div>

                    <div>
                        <label class="fs-label" for="unidades">Estandar</label>
                        <select class="fs-select" id="estandar" name="estandar" style="width: 100%;">
                            <option value="s">S</option>
                            </select>
                    </div>

                    <button type="submit" class="btn btn-primary" style="padding: 0.75rem; font-weight: bold; margin-top: 1rem;">
                        Crear Proyecto
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

<script>
    //from django.core.validators import FileExtensionValidator
    
    const fileInput = document.getElementById('fileInput');
    const imgI = document.getElementById('imgI');
    const subirI = document.getElementById('subirI');


    fileInput.addEventListener('change', function() {

        if(fileInput.files.length > 0) {
            subirI.textContent = fileInput.files[0].name;
            imgI.src = "/static/img/check2.png";
        }else{
            subirI.textContent = 'Subir imagen';
            imgI.src = "/static/img/plus.png";
        }
    });
</script>
</body>
</html>
