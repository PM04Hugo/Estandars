{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Departamento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4 text-center" style="width: 420px;">
        <h4 class="text-center mb-3">Registro de Usuario</h4>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

      
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3 text-start">
                <label class="form-label">Usuario</label>
                <input type="text" name="usuario" class="form-control" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class>
                    <label class="fs-label" for="departamento">
                        Departamento
                    </label>
                    <select class="fs-select" id="departamento" name="departamento"/>
                        <option value="1">Urgencias</option>
                        <option value="2">Diagnóstico</option>
                        <option value="3">General</option>
                    </select>
            </div>
            <br>

            <button type="submit" class="btn btn-primary w-100">
                Ingresar
            </button>
        </form>

    </div>
</div>

</body>
</html>
