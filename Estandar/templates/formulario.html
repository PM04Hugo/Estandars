

{% extends 'base.html' %}
{% load static %}

{% block title %}{{ Hola }}{% endblock %}

{% block content %}

<div style="
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background-color: #f5f5f5;
">
  
    <div style="
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        padding: 2.5rem;
        width: 100%;
        max-width: 720px;
    ">
        <div style="display: flex; align-items: center; gap: 2rem; ">
        <a  href="{% url 'base' %}">
            <input type="image" src="/static/img/arrow.png" alt="Submit" width="32" height="32">
        </a>
        <h2 style="margin: 0;">Regla</h2>
        </div>
        <br>
        <form class="fs-form fs-layout__2-column" method="POST">
            <fieldset>
                <div>
                    <label class="fs-label" for="nombre">Nombre</label>
                    <input class="fs-input" type="text" id="nombre" name="nombre" 
                     oninput="actualizarUnidades()" placeholder="Escribe un nombre...">
                </div>
                <div class>
                    <label class="fs-label" for="unidades">
                        Unidades
                    </label>
                    <select class="fs-select" id="unidades" name="unidades" onchange="actualizarSliders()"/>
                    </select>
                </div>
            </fieldset>
            <fieldset>
                <div class="slidecontainer">
                    <label class="slider-label-text">Minimo</label>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <input type="range" min="1" max="100" value="50" class="fs-slider" id="minimo"
                            oninput="document.getElementById('val-maximo').textContent = this.value">
                        
                    </div>
                </div>
                <div class="slidecontainer">
                    <label class="slider-label-text">Máximo</label>
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <input type="range" min="1" max="100" value="50" class="fs-slider" id="maximo"
                            oninput="document.getElementById('val-minimo').textContent = this.value">
                        
                    </div>
                </div>
            </fieldset>
            <div>
                <span  id="val-maximo">50</span>
            </div>
            <div>
                <span id="val-minimo">50</span>
            </div>
            <div class="fs-field col-span-full">
                <label class="fs-label" for="descripcion">Descripción</label>
                <textarea 
                    class="fs-textarea" 
                    id="descripcion" 
                    name="descripcion" 
                    placeholder="Describe la regla..."
                    rows="4">
                </textarea>
            </div>
            <div class="fs-button-group">
                <button class="fs-button" type="submit">Submit</button>
            </div>
        </form>
    </div>
</div>
  
<!-- Input de nombre -->
<input class="fs-input" type="text" id="nombre" name="nombre"
       oninput="actualizarUnidades()" placeholder="Escribe un nombre...">

<!-- Select de unidades (empieza vacío) -->
<select class="fs-select" id="unidades" onchange="actualizarSliders()">
</select>

<!-- Sliders con sus spans -->
<div class="slidecontainer">
    <label class="slider-label-text">Mínimo</label>
    <div style="display: flex; align-items: center; gap: 1rem;">
        <input type="range" class="fs-slider" id="minimo"
               oninput="document.getElementById('val-minimo').textContent = this.value">
        <span id="val-minimo">-</span>
    </div>
</div>
<div class="slidecontainer">
    <label class="slider-label-text">Máximo</label>
    <div style="display: flex; align-items: center; gap: 1rem;">
        <input type="range" class="fs-slider" id="maximo"
               oninput="document.getElementById('val-maximo').textContent = this.value">
        <span id="val-maximo">-</span>
    </div>
</div>

<!-- Datos construidos desde Django -->
<script>
const datos = {
    {% for medida in medidas %}
    "{{ medida.nombre }}": {
        "unidades": [
            {% for u in medida.unidades.all %}
            {
                "nombre": "{{ u.nombre }}",
                "min": {{ u.min }},
                "max": {{ u.max }},
                "step": {{ u.step }}
            }{% if not forloop.last %},{% endif %}
            {% endfor %}
        ]
    }{% if not forloop.last %},{% endif %}
    {% endfor %}
};

function actualizarUnidades() {
    const nombre = document.getElementById("nombre").value.trim();
    const selectUnidades = document.getElementById("unidades");

    selectUnidades.innerHTML = "";

    const clave = Object.keys(datos).find(
        k => k.toLowerCase() === nombre.toLowerCase()
    );

    if (clave) {
        datos[clave].unidades.forEach(u => {
            const option = document.createElement("option");
            option.value = u.nombre;
            option.textContent = u.nombre;
            option.dataset.min  = u.min;
            option.dataset.max  = u.max;
            option.dataset.step = u.step;
            selectUnidades.appendChild(option);
        });
        actualizarSliders();
    }
}

function actualizarSliders() {
    const option = document.getElementById("unidades").selectedOptions[0];
    if (!option) return;

    ["minimo", "maximo"].forEach(id => {
        const slider = document.getElementById(id);
        slider.min   = option.dataset.min;
        slider.max   = option.dataset.max;
        slider.step  = option.dataset.step;
        slider.value = (parseFloat(option.dataset.min) + parseFloat(option.dataset.max)) / 2;
        document.getElementById("val-" + id).textContent = slider.value;
    });
}
</script>

{% endblock %}
